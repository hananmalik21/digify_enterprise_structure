name: digify_enterprise_structure
description: Digify Enterprise Structure — organizational hierarchy configuration Flutter package.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.1"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.3
  dio: ^5.4.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  gap: ^3.0.1
  intl: any
  skeletonizer: ^2.1.2
  digify_core:
    git:
      url: https://github.com/hananmalik21/digify_core.git
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  flutter_gen_runner: ^5.4.0

flutter_gen:
  output: lib/gen/
  line_length: 120
  integrations:
    flutter_svg: true
  assets:
    enabled: true
    outputs:
      class_name: EnterpriseStructureAssets

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/icons/enterprise_structure/
    - assets/icons/employee_management/
